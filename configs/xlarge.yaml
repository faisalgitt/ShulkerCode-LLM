# =============================================
# Shulker Code — XLARGE Config (~80B params)
# Best for: GPU Clusters (8x A100/H100+)
# Developed by @kopeedev / CyeroX Development
# =============================================

model:
  name: "shulker-xlarge"
  vocab_size: 32000
  hidden_size: 8192
  num_layers: 64
  num_heads: 64
  num_kv_heads: 8          # Aggressive GQA for memory efficiency
  intermediate_size: 28672
  max_seq_len: 16384
  dropout: 0.0
  rope_theta: 1000000.0
  tie_embeddings: false

training:
  batch_size: 2
  gradient_accumulation_steps: 32
  learning_rate: 1e-5
  weight_decay: 0.1
  max_grad_norm: 1.0
  warmup_steps: 10000
  max_steps: 2000000
  save_steps: 10000
  eval_steps: 5000
  fp16: false
  bf16: true
  fsdp: true
  fsdp_sharding_strategy: "FULL_SHARD"
  deepspeed: true
  deepspeed_config: "configs/deepspeed_z3.json"
  dataloader_workers: 16

inference:
  device: "auto"
  quantization: "int4"     # 4-bit for single-node inference
  max_new_tokens: 8192
  temperature: 0.5
  top_k: 30
  top_p: 0.88
