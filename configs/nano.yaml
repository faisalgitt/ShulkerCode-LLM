# =============================================
# Shulker Code — NANO Config (~5M params)
# Best for: CPU-only, edge devices, testing
# Developed by @kopeedev / CyeroX Development
# =============================================

model:
  name: "shulker-nano"
  vocab_size: 32000
  hidden_size: 256
  num_layers: 4
  num_heads: 4
  num_kv_heads: 4          # Same as num_heads (no GQA for small models)
  intermediate_size: 1024  # FFN hidden size (4x hidden)
  max_seq_len: 1024
  dropout: 0.1
  rope_theta: 10000.0
  tie_embeddings: true

training:
  batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 3e-4
  weight_decay: 0.1
  max_grad_norm: 1.0
  warmup_steps: 100
  max_steps: 10000
  save_steps: 500
  eval_steps: 250
  fp16: false              # CPU doesn't support FP16
  bf16: false
  dataloader_workers: 2

inference:
  device: "cpu"
  quantization: "int8"     # INT8 for CPU efficiency
  max_new_tokens: 512
  temperature: 0.7
  top_k: 50
  top_p: 0.95
